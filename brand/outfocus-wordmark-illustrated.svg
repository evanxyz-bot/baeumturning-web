<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1330 400" role="img" aria-label="OutFocus illustrated wordmark">
  <title>OutFocus wordmark — round monoline, teal O·F initials (final)</title>
  <!-- 조리개 O: 확정 심볼(트위스트 60°) 무수정, 배치만 -->
  <g transform="translate(45,43) scale(1.42)" fill="#0b7a6a">
    <path d="M144.00 100.00 L137.88 179.43 A88 88 0 0 1 62.12 179.43 L122.00 138.11 Z"/>
    <path d="M122.00 138.11 L50.16 172.52 A88 88 0 0 1 12.27 106.90 L78.00 138.11 Z"/>
    <path d="M78.00 138.11 L12.27 93.10 A88 88 0 0 1 50.16 27.48 L56.00 100.00 Z"/>
    <path d="M56.00 100.00 L62.12 20.57 A88 88 0 0 1 137.88 20.57 L78.00 61.89 Z"/>
    <path d="M78.00 61.89 L149.84 27.48 A88 88 0 0 1 187.73 93.10 L122.00 61.89 Z"/>
    <path d="M122.00 61.89 L187.73 106.90 A88 88 0 0 1 149.84 172.52 L144.00 100.00 Z"/>
  </g>
  <!-- 소문자 utocus — 라운드 모노라인(검정). o도 검정으로 돌려 O·F만 teal로 부각 -->
  <g fill="#1a1a1a">
    <!-- u -->
    <path d="M342 167 A17 17 0 0 1 376 167 L376 225 A31 31 0 0 0 438 225 L438 167 A17 17 0 0 1 472 167 L472 225 A65 65 0 0 1 342 225 Z"/>
    <!-- t: 곧은 수직 캡슐(하단 꺾임 없음) + 크로스바 -->
    <g transform="translate(-18,0)">
      <path d="M536 132 A17 17 0 0 1 570 132 L570 273 A17 17 0 0 1 536 273 Z"/>
      <path d="M515 150 L591 150 A17 17 0 0 1 591 184 L515 184 A17 17 0 0 1 515 150 Z"/>
    </g>
    <!-- o (검정 링) -->
    <g transform="translate(-46,0)">
      <path fill-rule="evenodd" d="M777 220 A70 70 0 1 0 917 220 A70 70 0 1 0 777 220 Z M811 220 A36 36 0 1 0 883 220 A36 36 0 1 0 811 220 Z"/>
    </g>
    <!-- c -->
    <g transform="translate(-56,0)">
      <path d="M1068.34 179.85 A70 70 0 1 0 1068.34 260.15 A17 17 0 0 0 1040.49 240.65 A36 36 0 1 1 1040.49 199.35 A17 17 0 0 0 1068.34 179.85 Z"/>
    </g>
    <!-- u -->
    <g transform="translate(-66,0)">
      <path d="M1094 167 A17 17 0 0 1 1128 167 L1128 225 A31 31 0 0 0 1190 225 L1190 167 A17 17 0 0 1 1224 167 L1224 225 A65 65 0 0 1 1094 225 Z"/>
    </g>
    <!-- s: 다른 라운드 글자(o/c/u)보다 작아 보여 1.17배 확대(베이스라인·중심 고정) -->
    <g transform="translate(-76,0) translate(1289,289) scale(1.17) translate(-1289,-289)">
      <path d="M1327.32 165.54 A43.5 43.5 0 1 0 1294 237 A9.5 9.5 0 1 1 1286.72 252.61 A17 17 0 0 0 1260.68 274.46 A43.5 43.5 0 1 0 1294 203 A9.5 9.5 0 1 1 1301.28 187.39 A17 17 0 0 0 1327.32 165.54 Z"/>
    </g>
  </g>
  <!-- F: teal · 각진(좌상단 챔퍼 + 팔 끝 60° 사선 커트) · 조리개 크기에 맞춰 크게(더 굵고 높게) -->
  <g fill="#0b7a6a">
    <!-- 수직 기둥: 폭 50, 상단 y72(조리개 상단에 근접), 좌상단 45° 챔퍼 -->
    <path d="M596 290 L596 116 L640 72 L646 72 L646 290 Z"/>
    <!-- 상단 팔: 두께 50, 자유단 60° 사선 커트 -->
    <path d="M646 72 L722 72 L693 122 L646 122 Z"/>
    <!-- 중단 팔: 두께 46, 동일 60° 사선 커트 -->
    <path d="M646 164 L698 164 L671 210 L646 210 Z"/>
  </g>
</svg>
